<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/register.css">
</head>
<body>

  <header class="header">
    <nav class="nav">
      <a href="movies.html">Афиша</a>
      <a href="profile.html" id="profileLink">Профиль</a>
      <a href="login.html" id="loginLink">Войти</a>
      <a href="register.html" id="registerLink">Регистрация</a>
      <button id="logoutButton" class="logout-button">Выйти</button>
    </nav>
  </header>

  <main class="register-page">

    <form id="registerForm" class="register-form">

      <h1>Регистрация</h1>

      <input type="text"
        id="fullName"
        placeholder="ФИО"
        required>

      <input type="text"
        id="username"
        placeholder="Логин"
        required>

      <input type="password"
        id="password"
        placeholder="Пароль"
        required>

      <button type="submit">
        Зарегистрироваться
      </button>
      <p id="message"></p>
    </form>
  </main>
  <script src="js/common.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
