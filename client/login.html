<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="movies.html">Афиша</a>
      <a href="profile.html" id="profileLink">Профиль</a>
      <a href="login.html" id="loginLink">Войти</a>
      <a href="register.html" id="registerLink">Регистрация</a>
      <button id="logoutButton" class="logout-button">Выйти</button>
    </nav>
  </header>
  <main class="login-page">
    <form id="loginForm" class="login-form">
      <h1>Вход</h1>
      <input type="text"
        id="username"
        placeholder="Логин"
        required>

      <input type="password"
        id="password"
        placeholder="Пароль"
        required>
      <button type="submit">
        Войти
      </button>
      <p id="message"></p>
    </form>
  </main>
  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
