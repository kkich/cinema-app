<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Афиша</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/movies.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="movies.html">Афиша</a>
      <a href="profile.html" id="profileLink">Профиль</a>
      <a href="login.html" id="loginLink">Войти</a>
      <a href="register.html" id="registerLink">Регистрация</a>
      <button id="logoutButton" class="logout-button">Выйти</button>
    </nav>
  </header>
  <main class="movies-page">
    <h1>Афиша фильмов</h1>
    <div class="filters">
      <select id="genreFilter">
        <option value="">Все жанры</option>
        <option value="1">Боевик</option>
        <option value="2">Комедия</option>
        <option value="3">Драма</option>
      </select>
      <select id="ageFilter">
        <option value="">Все рейтинги</option>
        <option value="6">6+</option>
        <option value="12">12+</option>
        <option value="16">16+</option>
        <option value="18">18+</option>
      </select>
      <select id="sortFilter">
        <option value="">Без сортировки</option>
        <option value="price_asc">Цена по возрастанию</option>
        <option value="price_desc">Цена по убыванию</option>
      </select>
    </div>
    <div id="moviesList" class="movies-list"></div>
  </main>
  <script src="js/common.js"></script>
  <script src="js/movies.js"></script>
</body>
</html>
